# CI de nível 03 - Disparo após a conclusão de outra pipeline

# nome da pipeline
name: 'Execução por Deploy'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow dispatch
# gatilho agendado = schedule
# gatilho por conclusão de outra pipeline = workflow_run

on: 
    workflow_run:
       workflows: ['Execução Manual', 'Execução Agendada']
       types: 
         - completed
      
# tarefas dentro da pipeline = jobs

jobs: 
    #nome do job
    e2e-tests: 
        # maquina onde o job vai rodar
        runs-on: ubuntu-latest

        # só irá rodar o segundo pipe, caso o primeiro dê certo
        if: ${{ github.event.workflow_run.conclusion == 'success' }}

        # passos do job
        steps: 
              # clone do projeto
              - uses : actions/checkout@v4

              # instalação do node
              - uses : actions/setup-node@v4
                with:
                     node-version: 24.x

              # instalação do yarn
              - name : Instalando yarn
                run: npm install -g yarn

              # instalação das dependências
              - name: Instalando dependências
                run: yarn

              # instalação dos Browsers do Playwright
              - name: Instalando Browsers do Playwright
                run: yarn playwright install

              # executar os testes e2e
              - name: Executanto os testes e2e
                run: yarn run e2e


